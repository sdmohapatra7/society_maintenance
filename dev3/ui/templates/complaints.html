{% extends "base.html" %}

{% block content %}
<div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem;">
    <h1>Resident Complaints</h1>
    <button class="btn btn-primary" onclick="Complaints.modal.show()"><i class="fas fa-plus"></i> New Complaint</button>
</div>

<div class="card" id="complaintsGrid">
    <div class="skeleton-table"></div>
</div>

<div id="complaintModal" class="modal fade" tabindex="-1">
    <div class="modal-dialog modal-lg">
        <div class="modal-content card" style="border:none;">
            <div class="modal-header border-0 pb-0">
                <h2 class="modal-title h4">File a Complaint</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="complaintForm" class="needs-validation" novalidate enctype="multipart/form-data">
                <div class="modal-body pt-3">
                    <div class="mb-3">
                        <label class="form-label">Title</label>
                        <input type="text" class="form-control" name="title" required placeholder="Brief title of the issue">
                        <div class="invalid-feedback">Please provide a title.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Description</label>
                        <textarea class="form-control" name="description" rows="5" required placeholder="Describe the problem in detail..."></textarea>
                        <div class="invalid-feedback">Please provide a description.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Attach Photo/Document (Optional)</label>
                        <input type="file" class="form-control" name="document">
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Submit Complaint</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/complaints.js') }}"></script>
{% endblock %}
