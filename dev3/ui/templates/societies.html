{% extends "base.html" %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h1>Societies <small class="text-muted" style="font-size: 0.5em;">Management</small></h1>
    <button class="btn btn-primary" onclick="Societies.resetForm(); Societies.modal.show();">
        <i class="fas fa-plus me-2"></i>Add Society
    </button>
</div>

<div id="societiesGrid" class="card shadow-sm border-0 p-3">
    <div class="skeleton-table"></div>
</div>

<!-- Society Modal -->
<div id="societyModal" class="modal fade" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content card border-0">
            <div class="modal-header border-0">
                <h2 class="modal-title h4">Add Society</h2>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="societyForm" class="needs-validation" novalidate>
                <div class="modal-body">
                    <div class="mb-3">
                        <label class="form-label">Society Name</label>
                        <input type="text" class="form-control" name="name" required>
                        <div class="invalid-feedback">Society name is required.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Address</label>
                        <textarea class="form-control" name="address" rows="2" required></textarea>
                        <div class="invalid-feedback">Address is required.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Registration No</label>
                        <input type="text" class="form-control" name="registration_no" required>
                        <div class="invalid-feedback">Registration number is required.</div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contact Email</label>
                        <input type="email" class="form-control" name="contact_email" required>
                        <div class="invalid-feedback">A valid contact email is required.</div>
                    </div>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save Society</button>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/societies.js') }}"></script>
{% endblock %}
