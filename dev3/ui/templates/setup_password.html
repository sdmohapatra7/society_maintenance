<!DOCTYPE html>
<html>
<head>
    <title>Set Up Password - SocietyPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Outfit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { width: 100%; max-width: 400px; border-radius: 16px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        .btn-primary { background: #4f46e5; border: none; padding: 0.8rem; font-weight: 700; border-radius: 12px; }
        .form-control { padding: 0.8rem; border-radius: 10px; }
    </style>
</head>
<body>
    <div class="card p-4">
        <div class="text-center mb-4">
            <i class="fas fa-key text-primary fs-1 mb-3"></i>
            <h3>Set Your Password</h3>
            <p class="text-muted">Create a strong password for your resident portal access.</p>
        </div>

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ 'danger' if category == 'error' else category }} small">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">
            <div class="mb-3">
                <label class="form-label small fw-bold">New Password</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-bold">Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Save Password & Login</button>
        </form>
    </div>
</body>
</html>
